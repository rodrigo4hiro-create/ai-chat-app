<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AIチャット</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: 40px auto;
    }
    #chat {
      border: 1px solid #ccc;
      height: 300px;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<h2>AIチャット</h2>

<div id="chat"></div>

<input type="text" id="input" placeholder="メッセージ入力" />
<button onclick="send()">送信</button>

<script>
async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();

  if (!text) return;

  addMessage("あなた: " + text);
  input.value = "";

  try {
    // ★自分のサーバーに送る
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    addMessage("AI: " + (data.reply || "返答なし"));

  } catch (e) {
    addMessage("エラーが発生しました");
    console.error(e);
  }
}

function addMessage(msg) {
  const div = document.createElement("div");
  div.textContent = msg;
  document.getElementById("chat").appendChild(div);
}
</script>

</body>
</html>
