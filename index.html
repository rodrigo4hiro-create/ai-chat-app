<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>シンプルAIチャット</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      background: #f5f5f5;
    }
    #chat {
      background: white;
      padding: 10px;
      height: 400px;
      overflow-y: auto;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    .message {
      margin: 10px 0;
    }
    .user { color: blue; }
    .ai { color: green; }
    #inputArea {
      margin-top: 10px;
      display: flex;
    }
    input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<h2>AIチャット</h2>
<div id="chat"></div>

<div id="inputArea">
  <input type="text" id="userInput" placeholder="メッセージを入力..." onkeydown="if(event.key==='Enter') sendMessage()">
  <button onclick="sendMessage()">送信</button>
</div>

<script>
  // ★ここにAPIキーを入れる
  const API_KEY = "YOUR_API_KEY_HERE";

  const chat = document.getElementById("chat");

  async function sendMessage() {
    const input = document.getElementById("userInput");
    const userText = input.value.trim();

    if (!userText) return;

    addMessage("あなた: " + userText, "user");
    input.value = "";

    try {
      const response = await fetch("https://api.openai.com/v1/responses", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + API_KEY
        },
        body: JSON.stringify({
          model: "gpt-4.1-mini",
          input: userText
        })
      });

      const data = await response.json();

      // ★ここが重要：正しい取り出し方
      const aiText = data.output_text || "（返答なし）";

      addMessage("AI: " + aiText, "ai");

    } catch (error) {
      console.error(error);
      addMessage("エラーが発生しました", "ai");
    }
  }

  function addMessage(text, className) {
    const div = document.createElement("div");
    div.className = "message " + className;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }
</script>

</body>
</html>
